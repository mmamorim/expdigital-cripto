<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Cripto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { preflight: false } }</script>
</head>

<body>

    <h1>Aula Cripto - Exploração Digital</h1>

    <div>
        <button id="btnCifrar">CIFRAR AtBash</button>
        <button id="btnCifrarCesar">CIFRAR CESAR</button>
        <button id="btnCifrarVinagere">CIFRAR VINAGERE</button>
        <div class="flex gap-2 bg-gray-200 p-2 rounded-xl my-2">
            <div class="w-[400px]">
                <div class="font-bold">Entrada</div>
                <textarea id="txtEntrada" rows="5" class="w-full"></textarea>
            </div>
            <div class="w-[400px]">
                <div class="font-bold">Saída</div>
                <textarea id="txtCodificado" rows="5" class="w-full"></textarea>
            </div>
        </div>
    </div>
    <hr>
    <div>
        <button id="btnDecifrar">DECIFRAR</button>
        <button id="btnDecifrarCesar">DECIFRAR CESAR</button>
        <button id="btnDecifrarVinagere">DECIFRAR VINAGERE</button>
        <div class="flex gap-2 bg-gray-200 p-2 rounded-xl my-2">
            <div class="w-[400px]">
                <div class="font-bold">Entrada</div>
                <textarea id="txtEntradaCodificado" rows="5" class="w-full"></textarea>
            </div>
            <div class="w-[400px]">
                <div class="font-bold">Saída</div>
                <textarea id="txtSaidaDecodificado" rows="5" class="w-full"></textarea>
            </div>
        </div>
    </div>

    <script src="./main.js" type="module"></script>

</body>

</html>
